name: Live Fight Scoring

on:
  schedule:
    # Every 5 minutes on Saturdays and Sundays (fight days)
    - cron: '*/5 * * * 6'
    - cron: '*/5 * * * 0'
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout octagon-ai
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 rapidfuzz lxml

      - name: Run live scorer
        env:
          GITHUB_ACTIONS_SITE: ${{ github.workspace }}
        run: python score_event.py

      - name: Push results if changed
        run: |
          git config user.name "Octagon AI Bot"
          git config user.email "bot@octagon.ai"
          git add data/
          git diff --staged --quiet || git commit -m "Live results: $(date +'%Y-%m-%d %H:%M UTC')"
          git diff --staged --quiet || git push
