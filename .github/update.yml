name: Auto-update predictions

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at noon
  workflow_dispatch:        # Also allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy xgboost scikit-learn shap requests beautifulsoup4 rapidfuzz python-dotenv joblib scipy

      - name: Run updater
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python update_site.py

      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git diff --staged --quiet || git commit -m "Auto-update $(date)"
          git push